<div *ngIf="cargandoInicial()" class="fixed inset-0 z-[9999] bg-[#09090b] flex flex-col items-center justify-center">
    
    <h1 class="text-5xl font-extrabold text-green-500 mb-8 tracking-wider shadow-green-500/20 drop-shadow-lg">
        {{ title() }}
    </h1>
    
    <svg class="animate-spin h-12 w-12 text-green-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-20" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-80" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
    </svg>
    
    <p class="text-gray-400 mt-5 text-sm font-medium animate-pulse tracking-wide">
        Verificando sesión segura...
    </p>

</div>

<ng-container *ngIf="!cargandoInicial()">
    <app-navbar></app-navbar> 
    <router-outlet></router-outlet>
</ng-container>
