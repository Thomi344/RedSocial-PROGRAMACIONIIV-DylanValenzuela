<div *ngIf="cargandoInicial()" class="fixed inset-0 z-[9999] bg-[#09090b] flex flex-col items-center justify-center">
    
    <h1 class="text-5xl font-extrabold text-green-500 mb-8 tracking-wider shadow-green-500/20 drop-shadow-lg">
        {{ title() }}
    </h1>
    
    <svg class="animate-spin h-12 w-12 text-green-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-20" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-80" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
    </svg>
    
    <p class="text-gray-400 mt-5 text-sm font-medium animate-pulse tracking-wide">
        Verificando sesión segura...
    </p>

</div>

<ng-container *ngIf="!cargandoInicial()">
    <app-navbar></app-navbar> 
    <router-outlet></router-outlet>
</ng-container>

<div *ngIf="authService.mostrarModalRefrescar()" class="fixed inset-0 z-[999] flex items-center justify-center bg-black/80 backdrop-blur-sm px-4">
    <div class="bg-zinc-900 border border-white/10 rounded-2xl w-full max-w-sm p-6 shadow-2xl transform transition-all text-center">
        
        <div class="w-12 h-12 rounded-full bg-green-500/10 flex items-center justify-center mx-auto mb-4 shadow-[0_0_15px_rgba(34,197,94,0.2)]">
            <svg class="w-6 h-6 text-green-500 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
        </div>
        
        <h3 class="text-xl font-bold text-white mb-2">Tu sesión está por vencer</h3>
        
        <p class="text-gray-400 text-sm mb-6">Faltan 40 segundos para que tu sesión expire. ¿Querés seguir conectado en GreenPoint?</p>
        
        <div class="flex gap-3 w-full">
            <button (click)="cerrarSesionDesdeModal()" 
                    class="flex-1 px-4 py-2.5 rounded-xl text-sm font-semibold text-white bg-zinc-800 hover:bg-zinc-700 transition-colors">
                Salir
            </button>
            <button (click)="extenderSesion()" 
                    class="flex-1 px-4 py-2.5 rounded-xl text-sm font-bold text-black bg-green-500 hover:bg-green-400 shadow-[0_0_15px_rgba(34,197,94,0.3)] transition-all">
                Continuar
            </button>
        </div>
    </div>
</div>
