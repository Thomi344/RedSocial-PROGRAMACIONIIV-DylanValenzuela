<div class="min-h-screen flex items-center justify-center text-white font-sans px-4 bg-black bg-cover bg-center bg-no-repeat bg-fixed" 
    style="background-image: url('greenpoint-background.png');">
    
    <div class="w-full max-w-md p-10 bg-black/60 backdrop-blur-xl border border-white/20 rounded-3xl shadow-[0_8px_32px_0_rgba(0,0,0,0.7)]">
        
        <h2 class="text-3xl font-bold text-center mb-8 tracking-wider">
        Green<span class="text-green-400">Point</span>
        </h2>

        <form [formGroup]="miFormulario" (ngSubmit)="enviarForm()">
        
        <div class="mb-6 relative">
            <label class="text-xs text-gray-300 uppercase tracking-wide">Usuario o correo</label>
            <div class="relative mt-1">
            <input 
                type="text" 
                formControlName="identificador"
                class="w-full bg-black/40 border-b-2 border-white/20 py-3 pl-3 pr-10 rounded-t-md text-white focus:outline-none focus:border-green-400 transition-colors"
                placeholder="Ingresá tu usuario"
            >
            </div>
            <span *ngIf="identificador?.touched && identificador?.invalid" class="text-red-400 text-xs mt-2 block font-semibold">
            Este campo es obligatorio.
            </span>
        </div>

        <div class="mb-8 relative">
            <label class="text-xs text-gray-300 uppercase tracking-wide">Contraseña</label>
            <div class="relative mt-1">
            <input 
                type="password" 
                formControlName="clave"
                class="w-full bg-black/40 border-b-2 border-white/20 py-3 pl-3 pr-10 rounded-t-md text-white focus:outline-none focus:border-green-400 transition-colors"
                placeholder="••••••••"
            >
            </div>
            <div *ngIf="clave?.touched && clave?.invalid" class="text-red-400 text-xs mt-2 font-semibold">
            <span *ngIf="clave?.errors?.['required']" class="block">La contraseña es obligatoria.</span>
            <span *ngIf="clave?.errors?.['pattern']" class="block">Mínimo 8 caracteres, 1 mayúscula y 1 número.</span>
            </div>
        </div>

        <button 
            type="submit" 
            [disabled]="cargando()"
            class="w-full bg-green-500 hover:bg-green-400 text-black font-bold py-3 rounded-lg transition-all duration-300 transform hover:scale-[1.02] active:scale-95 flex justify-center items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
            <span *ngIf="!cargando()">Iniciar sesión</span>
            <span *ngIf="cargando()" class="flex items-center gap-2">
            Conectando...
            </span>
        </button>

        </form>

        <div class="mt-6 border-t border-white/10 pt-6">
        <p class="text-xs text-center text-gray-300 mb-4">Accesos de prueba rápidos</p>
        <div class="flex justify-center gap-2">
            <button type="button" (click)="loginRapido('thomasdylan05@hotmail.com', 'Thomas12')" class="px-3 py-1.5 bg-black/40 hover:bg-white/10 border border-white/20 rounded text-xs transition-colors text-gray-200">Admin</button>
            <button type="button" (click)="loginRapido('usuario1', 'User1234')" class="px-3 py-1.5 bg-black/40 hover:bg-white/10 border border-white/20 rounded text-xs transition-colors text-gray-200">User 1</button>
        </div>
        </div>

        <p class="text-center text-sm text-gray-300 mt-8">
        ¿No tenés una cuenta? 
        <a routerLink="/registro" class="text-green-400 font-semibold hover:text-green-300 hover:underline transition-colors">Registrate acá</a>
        </p>

    </div>
</div>

<div *ngIf="mostrarModal()" class="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm px-4">
    <div class="bg-black border-t-4 p-8 rounded-2xl shadow-2xl w-full max-w-sm text-center transform transition-all"
        [ngClass]="esError() ? 'border-red-500' : 'border-green-400'">
        <p class="text-white text-lg mb-6">{{ mensajeModal() }}</p>
        <button (click)="cerrarModal()" 
                class="w-full py-2 px-4 rounded-lg text-black font-bold transition-colors"
                [ngClass]="esError() ? 'bg-red-500 hover:bg-red-400' : 'bg-green-500 hover:bg-green-400'">
        Entendido
        </button>
    </div>
</div>
