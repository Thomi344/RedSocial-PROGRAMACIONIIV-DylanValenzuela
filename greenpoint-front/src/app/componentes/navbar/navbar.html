<nav class="sticky top-0 z-50 w-full bg-zinc-950 border-b border-white/10 px-4 py-3 shadow-2xl">
    <div class="max-w-4xl mx-auto flex justify-between items-center gap-2">
        
        <a routerLink="/publicaciones" class="text-2xl sm:text-3xl font-extrabold bg-gradient-to-r from-green-400 to-emerald-600 bg-clip-text text-transparent tracking-tight hover:opacity-80 transition-opacity cursor-pointer shrink-0">
            GreenPoint
        </a>

        <div *ngIf="!logeado()" class="flex items-center gap-2 sm:gap-4">
            <a routerLink="/login" class="text-xs sm:text-sm font-semibold text-gray-300 hover:text-white transition-colors cursor-pointer text-center">
                Iniciar sesión
            </a>
            <a routerLink="/registro" class="bg-green-500 hover:bg-green-400 text-black text-xs sm:text-sm font-bold py-1.5 px-3 sm:px-4 rounded-full transition-all transform hover:scale-105 active:scale-95 cursor-pointer text-center whitespace-nowrap">
                Registrarse
            </a>
        </div>

        <div *ngIf="logeado()" class="flex items-center gap-2 sm:gap-4">
            
            <a routerLink="/mi-perfil" class="flex items-center gap-2 sm:gap-3 cursor-pointer hover:bg-white/5 px-2 sm:px-3 py-2 rounded-xl transition-all duration-300">
                <img [src]="usuario()?.fotoPerfil || 'https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_960_720.png'" 
                    alt="Perfil" 
                    class="w-9 h-9 sm:w-10 sm:h-10 rounded-full object-cover border-2 border-green-500/50 shadow-lg">
                
                <span class="text-sm font-bold text-white hidden md:block tracking-wide max-w-[150px] truncate">
                    {{ usuario()?.nombre || usuario()?.nombreUsuario }}
                </span>
            </a>

            <a *ngIf="usuario()?.perfil === 'admin' || usuario()?.rol === 'admin'" 
                routerLink="/dashboard/usuarios" 
                routerLinkActive="bg-green-500/20 border-green-500/50 text-green-300 shadow-[0_0_10px_rgba(34,197,94,0.2)]"
                class="flex items-center gap-1.5 sm:gap-2 text-xs sm:text-sm font-bold text-green-500 border border-green-500/20 bg-green-500/5 hover:bg-green-500/10 px-3 py-1.5 sm:px-3 sm:py-2 rounded-xl transition-all duration-300 cursor-pointer">
                <svg class="w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                <span class="hidden sm:inline">Panel Admin</span>
                <span class="sm:hidden">Admin</span>
            </a>

            <button (click)="cerrarSesion()" title="Cerrar sesión" class="text-gray-400 hover:text-red-400 transition-colors p-1.5 sm:p-2 rounded-lg hover:bg-red-500/10">
                <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            </button>
        </div>

    </div>
</nav>
