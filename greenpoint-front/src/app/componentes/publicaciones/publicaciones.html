<div class="min-h-screen bg-zinc-950 selection:bg-green-500/30 font-sans pb-12 pt-8">
    
    <div class="max-w-2xl mx-auto px-4">
      
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4">
            
            <div class="flex bg-black/30 p-1.5 rounded-xl border border-white/5 w-fit">
                <button 
                    (click)="cambiarOrden('fecha')"
                    [ngClass]="{'bg-zinc-800 text-green-400 font-semibold shadow-md': ordenActual() === 'fecha', 'text-gray-400 hover:text-white': ordenActual() !== 'fecha'}"
                    class="px-5 py-2 rounded-lg text-sm transition-all duration-300 cursor-pointer flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    Recientes
                </button>
                <button 
                    (click)="cambiarOrden('likes')"
                    [ngClass]="{'bg-zinc-800 text-green-400 font-semibold shadow-md': ordenActual() === 'likes', 'text-gray-400 hover:text-white': ordenActual() !== 'likes'}"
                    class="px-5 py-2 rounded-lg text-sm transition-all duration-300 cursor-pointer flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                    Destacados
                </button>
            </div>

            <button class="bg-green-500 hover:bg-green-400 text-black font-bold py-2.5 px-5 rounded-full flex items-center gap-2 shadow-[0_0_15px_rgba(34,197,94,0.3)] transition-all transform hover:scale-105 active:scale-95 text-sm cursor-pointer w-full sm:w-auto justify-center">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                Crear Posteo
            </button>
            
        </div>
    
        <div *ngIf="cargando()" class="space-y-6">
            <div *ngFor="let item of [1,2,3]" class="bg-zinc-900/50 border border-white/5 rounded-2xl p-5 animate-pulse">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-12 h-12 rounded-full bg-white/5"></div>
                    <div class="space-y-2 flex-1">
                        <div class="h-3 w-32 bg-white/5 rounded-full"></div>
                        <div class="h-2 w-20 bg-white/5 rounded-full"></div>
                    </div>
                </div>
                <div class="space-y-3">
                    <div class="h-3 w-full bg-white/5 rounded-full"></div>
                    <div class="h-3 w-full bg-white/5 rounded-full"></div>
                    <div class="h-3 w-3/4 bg-white/5 rounded-full"></div>
                </div>
            </div>
        </div>
    
        <div *ngIf="!cargando() && publicaciones().length === 0" class="flex flex-col items-center justify-center py-20 px-4 bg-gradient-to-b from-zinc-900/50 to-transparent rounded-2xl border border-white/5 border-dashed mt-4">
            <div class="w-20 h-20 mb-6 rounded-full bg-green-500/10 flex items-center justify-center shadow-[0_0_30px_rgba(34,197,94,0.1)]">
                <svg class="w-10 h-10 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m3.75 9v6m3-3H9m1.5-12H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"></path></svg>
            </div>
            <h3 class="text-xl font-bold text-white mb-2">Nada por aquí</h3>
            <p class="text-gray-400 text-center max-w-sm mb-6 text-sm">El feed está un poco silencioso. ¡Animate a ser el primero en romper el hielo!</p>
        </div>
    
        <div *ngIf="!cargando()" class="space-y-6">
            </div>
    
        <div class="flex justify-between items-center mt-10 pt-6 border-t border-white/5" *ngIf="!cargando() && (paginaActual() > 1 || hayMasPaginas())">
            <button 
                (click)="paginaAnterior()"
                [disabled]="paginaActual() === 1"
                class="px-5 py-2.5 rounded-xl text-sm font-semibold transition-all duration-300 disabled:opacity-20 disabled:cursor-not-allowed bg-zinc-900 text-white hover:bg-zinc-800 border border-white/10 flex items-center gap-2 cursor-pointer">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                Anterior
            </button>
            
            <div class="flex items-center gap-2">
                <span class="text-gray-400 text-xs font-bold uppercase tracking-widest">
                    Página {{ paginaActual() }}
                </span>
            </div>
            
            <button 
                (click)="paginaSiguiente()"
                [disabled]="!hayMasPaginas()"
                class="px-5 py-2.5 rounded-xl text-sm font-semibold transition-all duration-300 disabled:opacity-20 disabled:cursor-not-allowed bg-zinc-900 text-white hover:bg-zinc-800 border border-white/10 flex items-center gap-2 cursor-pointer">
                Siguiente
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </button>
        </div>
    
    </div>
</div>
