<div class="min-h-screen bg-zinc-950 selection:bg-green-500/30 font-sans pb-12 pt-8">
    
    <div class="max-w-2xl mx-auto px-4">

        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4">
            
            <div class="flex bg-black/30 p-1.5 rounded-xl border border-white/5 w-fit">
                <button 
                    (click)="cambiarOrden('fecha')"
                    [ngClass]="{'bg-zinc-800 text-green-400 font-semibold shadow-md': ordenActual() === 'fecha', 'text-gray-400 hover:text-white': ordenActual() !== 'fecha'}"
                    class="px-5 py-2 rounded-lg text-sm transition-all duration-300 cursor-pointer flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    Recientes
                </button>
                <button 
                    (click)="cambiarOrden('likes')"
                    [ngClass]="{'bg-zinc-800 text-green-400 font-semibold shadow-md': ordenActual() === 'likes', 'text-gray-400 hover:text-white': ordenActual() !== 'likes'}"
                    class="px-5 py-2 rounded-lg text-sm transition-all duration-300 cursor-pointer flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                    Destacados
                </button>
            </div>

            <button (click)="abrirModalCrear()" class="bg-green-500 hover:bg-green-400 text-black font-bold py-2.5 px-5 rounded-full flex items-center gap-2 shadow-[0_0_15px_rgba(34,197,94,0.3)] transition-all transform hover:scale-105 active:scale-95 text-sm cursor-pointer w-full sm:w-auto justify-center">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                Crear Posteo
            </button>
            
        </div>
    
        <div *ngIf="cargando() && publicaciones().length === 0" class="space-y-6">
            <div *ngFor="let item of [1,2,3]" class="bg-zinc-900/50 border border-white/5 rounded-2xl p-5 animate-pulse">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-12 h-12 rounded-full bg-white/5"></div>
                    <div class="space-y-2 flex-1">
                        <div class="h-3 w-32 bg-white/5 rounded-full"></div>
                        <div class="h-2 w-20 bg-white/5 rounded-full"></div>
                    </div>
                </div>
                <div class="space-y-3">
                    <div class="h-3 w-full bg-white/5 rounded-full"></div>
                    <div class="h-3 w-full bg-white/5 rounded-full"></div>
                    <div class="h-3 w-3/4 bg-white/5 rounded-full"></div>
                </div>
            </div>
        </div>
    
        <div *ngIf="!cargando() && publicaciones().length === 0" class="flex flex-col items-center justify-center py-20 px-4 bg-gradient-to-b from-zinc-900/50 to-transparent rounded-2xl border border-white/5 border-dashed mt-4">
            <div class="w-20 h-20 mb-6 rounded-full bg-green-500/10 flex items-center justify-center shadow-[0_0_30px_rgba(34,197,94,0.1)]">
                <svg class="w-10 h-10 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m3.75 9v6m3-3H9m1.5-12H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"></path></svg>
            </div>
            <h3 class="text-xl font-bold text-white mb-2">Nada por aquí</h3>
            <p class="text-gray-400 text-center max-w-sm mb-6 text-sm">El feed está un poco silencioso. ¡Animate a ser el primero en romper el hielo!</p>
        </div>
    
        <div class="space-y-6" *ngIf="publicaciones().length > 0">
            <div *ngFor="let post of publicaciones()">
                <app-publicacion-card [publicacion]="post"></app-publicacion-card>
            </div>
        </div>
    
        <div class="flex justify-center mt-10 pt-6 border-t border-white/5 pb-10" *ngIf="hayMasPaginas() && publicaciones().length > 0">
            <button 
                (click)="cargarMas()"
                [disabled]="cargando()"
                class="px-6 py-3 rounded-full text-sm font-bold transition-all duration-300 bg-zinc-900 text-white hover:bg-zinc-800 border border-white/10 flex items-center gap-3 cursor-pointer disabled:opacity-50 shadow-lg hover:shadow-green-500/10">
                
                <svg *ngIf="cargando()" class="animate-spin -ml-1 mr-2 h-4 w-4 text-green-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                
                <span *ngIf="!cargando()">Cargar más publicaciones</span>
                <span *ngIf="cargando()">Cargando...</span>
                
                <svg *ngIf="!cargando()" class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
            </button>
        </div>

        <div class="text-center mt-10 pt-6 pb-10" *ngIf="!hayMasPaginas() && publicaciones().length > 0">
            <p class="text-gray-500 text-sm font-medium tracking-wide">¡Llegaste al final! No hay más posteos por ahora.</p>
        </div>
    
    </div>
</div>

<div *ngIf="mostrarModalCrear()" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-sm px-4">
    <div class="bg-zinc-900 border border-white/10 rounded-2xl w-full max-w-lg shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
        
        <div class="flex justify-between items-center p-4 border-b border-white/10">
            <h3 class="text-lg font-bold text-white">Nuevo Posteo</h3>
            <button (click)="cerrarModalCrear()" [disabled]="creandoPost()" class="text-gray-400 hover:text-white transition-colors disabled:opacity-50">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>

        <form [formGroup]="postForm" (ngSubmit)="crearPost()" class="p-4 overflow-y-auto flex-1 custom-scrollbar">
            <div class="space-y-4">
                <div>
                    <input type="text" formControlName="titulo" placeholder="Título (ej: Mi nueva planta)" class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500 transition-all font-semibold">
                    <span *ngIf="postForm.get('titulo')?.invalid && postForm.get('titulo')?.touched" class="text-red-400 text-xs mt-1 ml-1 block">
                        El título es requerido (máx 50 caracteres).
                    </span>
                </div>

                <div>
                    <textarea formControlName="descripcion" rows="4" placeholder="¿Qué querés compartir con la comunidad?" class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500 transition-all resize-none"></textarea>
                    <span *ngIf="postForm.get('descripcion')?.invalid && postForm.get('descripcion')?.touched" class="text-red-400 text-xs mt-1 ml-1 block">
                        La descripción es requerida (máx 300 caracteres).
                    </span>
                </div>

                <div>
                    <div *ngIf="previewImagen()" class="relative rounded-xl overflow-hidden border border-white/10 group">
                        <img [src]="previewImagen()" alt="Vista previa" class="w-full h-48 object-cover">
                        <button type="button" (click)="archivoSeleccionado.set(null); previewImagen.set(null)" class="absolute top-2 right-2 bg-black/60 hover:bg-red-500 text-white p-1.5 rounded-lg backdrop-blur-sm transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>

                    <label *ngIf="!previewImagen()" class="flex flex-col items-center justify-center w-full h-32 border-2 border-white/10 border-dashed rounded-xl cursor-pointer bg-black/20 hover:bg-black/40 hover:border-green-500/50 transition-all group">
                        <div class="flex flex-col items-center justify-center pt-5 pb-6">
                            <svg class="w-8 h-8 mb-2 text-gray-500 group-hover:text-green-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                            <p class="text-sm text-gray-400 group-hover:text-gray-300"><span class="font-semibold text-green-500">Clic para subir</span> una foto (Opcional)</p>
                        </div>
                        <input type="file" class="hidden" accept="image/*" (change)="onFileSelected($event)">
                    </label>
                </div>
            </div>

            <div class="mt-6 flex gap-3">
                <button type="button" (click)="cerrarModalCrear()" [disabled]="creandoPost()" class="flex-1 py-2.5 rounded-xl font-semibold text-white bg-zinc-800 hover:bg-zinc-700 transition-colors disabled:opacity-50 text-sm">
                    Cancelar
                </button>
                <button type="submit" [disabled]="postForm.invalid || creandoPost()" class="flex-1 py-2.5 rounded-xl font-bold text-black bg-green-500 hover:bg-green-400 transition-all shadow-[0_0_15px_rgba(34,197,94,0.2)] disabled:opacity-50 disabled:cursor-not-allowed flex justify-center items-center gap-2 text-sm">
                    <svg *ngIf="creandoPost()" class="animate-spin h-4 w-4 text-black" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    <span *ngIf="!creandoPost()">Publicar</span>
                </button>
            </div>
        </form>
    </div>
</div>

<div *ngIf="mostrarModalError()" class="fixed inset-0 z-[110] flex items-center justify-center bg-black/80 backdrop-blur-sm px-4">
    <div class="bg-zinc-900 border border-white/10 rounded-2xl w-full max-w-sm p-6 shadow-2xl transform transition-all text-center">
        
        <div class="w-12 h-12 rounded-full bg-red-500/10 flex items-center justify-center mx-auto mb-4 shadow-[0_0_15px_rgba(239,68,68,0.2)]">
            <svg class="w-6 h-6 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        </div>
        
        <h3 class="text-xl font-bold text-white mb-2">¡Ups! Algo salió mal</h3>
        <p class="text-gray-400 text-sm mb-6">{{ mensajeError() }}</p>
        
        <button 
            (click)="cerrarModalError()"
            class="w-full px-4 py-2.5 rounded-xl text-sm font-bold text-white bg-zinc-800 hover:bg-zinc-700 transition-colors shadow-md">
            Entendido
        </button>
    </div>
</div>
