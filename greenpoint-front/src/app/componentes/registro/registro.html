<div class="min-h-screen py-10 flex items-center justify-center bg-oscuro-fondo relative overflow-hidden text-white font-sans px-4">
    
    <div class="absolute top-[-10%] right-[-10%] w-96 h-96 bg-greenpoint/20 rounded-full blur-[100px]"></div>
    <div class="absolute bottom-[-10%] left-[-10%] w-96 h-96 bg-greenpoint-dark/30 rounded-full blur-[100px]"></div>

    <div class="relative w-full max-w-2xl p-8 md:p-10 bg-white/5 backdrop-blur-2xl border border-white/10 rounded-3xl shadow-[0_8px_32px_0_rgba(0,0,0,0.37)] z-10">
        
        <h2 class="text-3xl font-bold text-center mb-2 tracking-wider">
        Sumate a Green<span class="text-greenpoint">Point</span>
        </h2>
        <p class="text-center text-gray-400 mb-8 text-sm">Creá tu perfil y empezá a conectar.</p>

        <form [formGroup]="miFormulario" (ngSubmit)="enviarForm()">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-5">
            
            <div>
            <label class="text-xs text-gray-400 uppercase tracking-wide">Nombre</label>
            <input type="text" formControlName="nombre" class="w-full mt-1 bg-oscuro-input/50 border-b-2 border-oscuro-borde py-2.5 pl-3 rounded-t-md text-white focus:outline-none focus:border-greenpoint focus:bg-oscuro-input transition-colors">
            <span *ngIf="nombre?.touched && nombre?.invalid" class="text-red-400 text-xs mt-1 block">Requerido.</span>
            </div>

            <div>
            <label class="text-xs text-gray-400 uppercase tracking-wide">Apellido</label>
            <input type="text" formControlName="apellido" class="w-full mt-1 bg-oscuro-input/50 border-b-2 border-oscuro-borde py-2.5 pl-3 rounded-t-md text-white focus:outline-none focus:border-greenpoint focus:bg-oscuro-input transition-colors">
            <span *ngIf="apellido?.touched && apellido?.invalid" class="text-red-400 text-xs mt-1 block">Requerido.</span>
            </div>

            <div>
            <label class="text-xs text-gray-400 uppercase tracking-wide">Nombre de usuario</label>
            <input type="text" formControlName="nombreUsuario" class="w-full mt-1 bg-oscuro-input/50 border-b-2 border-oscuro-borde py-2.5 pl-3 rounded-t-md text-white focus:outline-none focus:border-greenpoint focus:bg-oscuro-input transition-colors">
            <span *ngIf="nombreUsuario?.touched && nombreUsuario?.invalid" class="text-red-400 text-xs mt-1 block">Requerido.</span>
            </div>

            <div>
            <label class="text-xs text-gray-400 uppercase tracking-wide">Nacimiento</label>
            <input type="date" formControlName="fechaNacimiento" class="w-full mt-1 bg-oscuro-input/50 border-b-2 border-oscuro-borde py-2.5 pl-3 rounded-t-md text-white focus:outline-none focus:border-greenpoint focus:bg-oscuro-input transition-colors [color-scheme:dark]">
            <span *ngIf="fechaNacimiento?.touched && fechaNacimiento?.invalid" class="text-red-400 text-xs mt-1 block">Requerido.</span>
            </div>

        </div>

        <div class="mb-5 relative">
            <label class="text-xs text-gray-400 uppercase tracking-wide">Correo electrónico</label>
            <input type="email" formControlName="correo" class="w-full mt-1 bg-oscuro-input/50 border-b-2 border-oscuro-borde py-2.5 pl-3 rounded-t-md text-white focus:outline-none focus:border-greenpoint focus:bg-oscuro-input transition-colors">
            <span *ngIf="correo?.touched && correo?.invalid" class="text-red-400 text-xs mt-1 block">Ingresá un correo válido.</span>
        </div>

        <div class="mb-5 relative">
            <label class="text-xs text-gray-400 uppercase tracking-wide">Descripción breve</label>
            <textarea formControlName="descripcion" rows="2" class="w-full mt-1 bg-oscuro-input/50 border-b-2 border-oscuro-borde py-2.5 pl-3 rounded-t-md text-white focus:outline-none focus:border-greenpoint focus:bg-oscuro-input transition-colors resize-none" placeholder="Contanos algo sobre vos..."></textarea>
        </div>

        <div class="mb-6">
            <label class="text-xs text-gray-400 uppercase tracking-wide block mb-2">Foto de perfil</label>
            <input type="file" accept="image/*" (change)="onArchivoSeleccionado($event)" class="block w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-greenpoint/10 file:text-greenpoint hover:file:bg-greenpoint/20 transition-colors">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-8">
            <div>
            <label class="text-xs text-gray-400 uppercase tracking-wide">Contraseña</label>
            <input type="password" formControlName="clave" class="w-full mt-1 bg-oscuro-input/50 border-b-2 border-oscuro-borde py-2.5 pl-3 rounded-t-md text-white focus:outline-none focus:border-greenpoint focus:bg-oscuro-input transition-colors">
            <div *ngIf="clave?.touched && clave?.invalid" class="text-red-400 text-xs mt-1">
                <span *ngIf="clave?.errors?.['pattern']">8 caracteres, 1 mayúscula y 1 número.</span>
            </div>
            </div>

            <div>
            <label class="text-xs text-gray-400 uppercase tracking-wide">Repetir contraseña</label>
            <input type="password" formControlName="repiteClave" class="w-full mt-1 bg-oscuro-input/50 border-b-2 border-oscuro-borde py-2.5 pl-3 rounded-t-md text-white focus:outline-none focus:border-greenpoint focus:bg-oscuro-input transition-colors">
            </div>
        </div>

        <button type="submit" [disabled]="cargando()" class="w-full bg-greenpoint hover:bg-greenpoint-light text-oscuro-fondo font-bold py-3 rounded-lg transition-all duration-300 disabled:opacity-50">
            <span *ngIf="!cargando()">Crear cuenta</span>
            <span *ngIf="cargando()">Registrando...</span>
        </button>

        </form>

        <p class="text-center text-sm text-gray-400 mt-6">
        ¿Ya tenés cuenta? 
        <a routerLink="/login" class="text-greenpoint hover:text-greenpoint-light font-semibold hover:underline transition-colors">Iniciá sesión acá</a>
        </p>

    </div>
    </div>

    <div *ngIf="mostrarModal()" class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm px-4">
    <div class="bg-oscuro-tarjeta border-t-4 p-8 rounded-2xl shadow-2xl w-full max-w-sm text-center transform transition-all"
        [ngClass]="esError() ? 'border-red-500' : 'border-greenpoint'">
        <p class="text-white text-lg mb-6">{{ mensajeModal() }}</p>
        <button (click)="cerrarModal()" 
                class="w-full py-2 px-4 rounded-lg text-oscuro-fondo font-bold transition-colors"
                [ngClass]="esError() ? 'bg-red-500 hover:bg-red-400' : 'bg-greenpoint hover:bg-greenpoint-light'">
        Entendido
        </button>
    </div>
</div>
